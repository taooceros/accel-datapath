# DSA Benchmark Configuration
# This file controls which benchmarks to run

[polling]
# Polling mode - how DSA completion is detected
inline = true       # Inline polling using PollingRunLoop (dsa.poll() in task execution)
threaded = true     # Background thread polling (dedicated polling thread)

[scheduling]
# Scheduling pattern - how tasks are spawned and concurrency is managed
sliding_window = true   # Semaphore-like: spawn new op as one completes (maintains N in-flight)
batch = false           # Spawn N ops, wait all complete, then spawn next batch
scoped_workers = true  # N worker coroutines processing items sequentially

[queues]
# Queue types to benchmark - different synchronization strategies
nolock = true     # Single-threaded, no synchronization (baseline, inline only)
mutex = true      # std::mutex based synchronization
tas = true        # Test-and-Set spinlock
ttas = true       # Test-and-Test-and-Set spinlock (cache-friendly)
backoff = true    # TTAS with exponential backoff
lockfree = true   # Lock-free using atomic compare-and-swap

[parameters]
# Benchmark parameters
concurrency_levels = [2]                    # Max operations in-flight at once
msg_sizes = [4096]  # Size of each memory operation in bytes
total_bytes = 33554432                                  # Total bytes to copy per iteration (32 MB)
iterations = 1                                         # Number of times to repeat the full copy

[output]
# Output configuration
csv_file = "dsa_benchmark_results.csv"
