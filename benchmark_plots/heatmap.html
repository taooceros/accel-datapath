        const traceMetadata = [{"scheduling": "sliding_window_reusable_mirrored_ring_batch_bs16", "submission": "immediate", "mode": "inline", "queue_type": "NoLock", "batch_size": 16, "metric": "bandwidth_gbps", "metric_label": "Bandwidth (GB/s)"}, {"scheduling": "sliding_window_reusable_mirrored_ring_batch_bs16", "submission": "immediate", "mode": "inline", "queue_type": "NoLock", "batch_size": 16, "metric": "msg_rate_mps", "metric_label": "Message Rate (M/s)"}, {"scheduling": "sliding_window_reusable_mirrored_ring_batch_bs16", "submission": "immediate", "mode": "inline", "queue_type": "NoLock", "batch_size": 16, "metric": "latency_avg_ns", "metric_label": "Avg Latency (us)"}, {"scheduling": "sliding_window_reusable_mirrored_ring_batch_bs4", "submission": "immediate", "mode": "inline", "queue_type": "NoLock", "batch_size": 4, "metric": "bandwidth_gbps", "metric_label": "Bandwidth (GB/s)"}, {"scheduling": "sliding_window_reusable_mirrored_ring_batch_bs4", "submission": "immediate", "mode": "inline", "queue_type": "NoLock", "batch_size": 4, "metric": "msg_rate_mps", "metric_label": "Message Rate (M/s)"}, {"scheduling": "sliding_window_reusable_mirrored_ring_batch_bs4", "submission": "immediate", "mode": "inline", "queue_type": "NoLock", "batch_size": 4, "metric": "latency_avg_ns", "metric_label": "Avg Latency (us)"}, {"scheduling": "sliding_window_reusable_mirrored_ring_batch_bs64", "submission": "immediate", "mode": "inline", "queue_type": "NoLock", "batch_size": 64, "metric": "bandwidth_gbps", "metric_label": "Bandwidth (GB/s)"}, {"scheduling": "sliding_window_reusable_mirrored_ring_batch_bs64", "submission": "immediate", "mode": "inline", "queue_type": "NoLock", "batch_size": 64, "metric": "msg_rate_mps", "metric_label": "Message Rate (M/s)"}, {"scheduling": "sliding_window_reusable_mirrored_ring_batch_bs64", "submission": "immediate", "mode": "inline", "queue_type": "NoLock", "batch_size": 64, "metric": "latency_avg_ns", "metric_label": "Avg Latency (us)"}];
        const STORAGE_KEY = 'dsa_heatmap_filters';

        function getSelectedValue(name) {
            const radio = document.querySelector(`input[name="${name}"]:checked`);
            return radio ? radio.value : null;
        }

        function saveSelections() {
            const state = {};
            const names = new Set();
            document.querySelectorAll('.controls input[type="radio"]').forEach(r => names.add(r.name));
            names.forEach(name => { state[name] = getSelectedValue(name); });
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
        }

        function restoreSelections() {
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (!saved) return false;
                let restored = false;
                for (const [name, value] of Object.entries(saved)) {
                    if (!value) continue;
                    const radio = document.querySelector(`input[name="${name}"][value="${CSS.escape(value)}"]`);
                    if (radio) {
                        radio.checked = true;
                        restored = true;
                    }
                }
                return restored;
            } catch(e) { return false; }
        }

        function updateHeatmap() {
            saveSelections();

            const selectedScheduling = getSelectedValue('scheduling');
            const selectedSubmission = getSelectedValue('submission');
            const selectedMode = getSelectedValue('mode');
            const selectedQueueType = getSelectedValue('queue_type');
            const selectedBatchSize = getSelectedValue('batch_size');
            const selectedMetric = getSelectedValue('metric');

            const visibility = traceMetadata.map(meta => {
                return meta.scheduling === selectedScheduling &&
                       meta.submission === selectedSubmission &&
                       meta.mode === selectedMode &&
                       meta.queue_type === selectedQueueType &&
                       meta.batch_size === parseInt(selectedBatchSize) &&
                       meta.metric === selectedMetric;
            });

            // Find the selected metric label for title
            const selectedMeta = traceMetadata.find((meta, i) => visibility[i]);
            const title = selectedMeta ?
                `${selectedScheduling} / ${selectedSubmission} / ${selectedMode} / ${selectedQueueType} / bs=${selectedBatchSize} - ${selectedMeta.metric_label}` :
                'DSA Benchmark Heatmap';

            Plotly.restyle('heatmapDiv', { visible: visibility });
            Plotly.relayout('heatmapDiv', { 'title.text': title });
        }

        // Add event listeners
        document.querySelectorAll('.controls input[type="radio"]').forEach(r => {
            r.addEventListener('change', updateHeatmap);
        });

        // Restore saved selections and update
        if (restoreSelections()) {
            updateHeatmap();
        }
    </script>
</body>
</html>
